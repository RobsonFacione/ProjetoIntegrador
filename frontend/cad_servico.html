<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Serviço</title>
    <link rel="stylesheet" href="cad_servico.css">
    <style>     
        body {
    margin: 0;
}

.container {
    background-color: rgba(255, 255, 255, 0.4); /* Adicione a opacidade ao definir a cor de fundo com rgba */
    padding: 20px;
    border: none;
}



#botao {
    background-color: #A9A9A9; /* Cor de fundo para os botões */
    color: black;
    padding: 10px 15px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    width: 300px;
}

#botaovoltar {
    background-color: #A9A9A9; /* Cor de fundo para os botões */
    color: black;
    padding: 10px 15px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    width: 270px;
}

#botao:hover, #botaovoltar:hover {
    background-color: #6CA6CD; /* Altere a cor ao passar o mouse sobre os botões se desejar */
}

.botao{
    text-align: center;
}
    
     
   
      
    </style>
</head>

<body>
    <div class="container">
        
        <div class="header">
            <header style="background-color: #6CA6CD; border: none;">Cadastrar Serviço</header>
        </div>

        <form action="cadastro_cad_servico.php" method="post">
            <div class="servico">
                <div class="tipo1">
                    <h3 style="font-family: sans-serif; padding-left: 10px;">Serviço</h3>
                </div>
                <div class="tipo2">
                    <input type="text" name="servico" id="servico"
                        placeholder="Digite o tipo de serviço a ser cadastrado" required>
                </div>
            </div>
            <br>

            <div class="botao">
                <input type="submit" id="botao" value="Cadastrar">
            </div>

        </form>

        <div class="voltar">
            <a href="javascript:history.go(-1)" id="botaovoltar">Voltar</a>
        </div>


    </div>
</body>

</html>
