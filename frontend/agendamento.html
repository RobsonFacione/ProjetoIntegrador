<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento</title>
    <link rel="stylesheet" href="agendamento.css">
</head>

<body>

    <div class="container">
<div class="header">
        <header>Agendamento</header>
</div>
        <form action="agendamento.php" method="post">
            <!--link com o banco de dados para realizar o cadastro, verifiar se há diferenças nas variaveis-->
            <div class="paciente">
                <div class="paciente1">
                    <h3 style="font-family: sans-serif;" id="paciente1">Nome</h3>
                </div>
                <div class="paciente2">
                    <input type="text" id="paciente" name="id_paciente" placeholder="Digite o nome do paciente" required>
                </div>
            </div><br>

            <div class="data">    
                <div class="data1">
                    <h3 style="font-family: sans-serif;">Data</h3>
                </div>
                <div class="data2">
                    <input type="date" id="data" name="data" placeholder="Digite a data" required>
                </div>
            </div>

            <div class="hora">
                <div class="hora1">
                    <h3 style="font-family: sans-serif;">Hora</h3>
                </div>
                <div class="hora2">
                    <input type="time" id="hora" name="hora" placeholder="Digite a hora" required>
                </div>
            </div><br>

            <div class="dentista">
                <div class="dentista1">
                    <h3 style="font-family: sans-serif;">Dentista</h3>
                </div>
                <div class="dentista2">
                    <input type="text" id="dentista" name="id_dentista/servico"
                        placeholder="Digite o nome do dentista" required>
                </div>
            </div><br>

            <div class="servico">
                <div class="servico1">
                    <h3 style="font-family: sans-serif;">Serviço</h3>
                </div>
                <div class="servico2">
                    <input type="text" id="servico" name="id_dentista/servico"
                        placeholder="Digite o tipo de serviço" required>
                </div>
            </div><br>

            <br>

            <div class="botao">
                <input type="submit" id="botao" value="Agendar">
            </div>
        </form>

        <div class="voltar">
            <a href="javascript:history.go(-1)" id="botaovoltar">Voltar</a>
        </div>


    </div>

</body>

</html>
