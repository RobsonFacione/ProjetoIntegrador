<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Dentista</title>
    <link rel="stylesheet" href="cad_dentista.css">
</head>
<body>
    <div class="container">

        <header>Cadastro de Dentista</header>


        <form action="cadastro_cad_dentista.php" method="post"> <!--preenchimento igual o banco de dados-->
            <div class="nome">
                <div class="nome1">
                    <h3 style="font-family: sans-serif;">Nome</h3>
                </div>
                <div class="nome2">
                    <input type="text" name="nome" id="nome" placeholder="Digite o nome" required>
                </div>
            </div>

            <div class="cpf">
                <div class="cpf1">
                    <h3 style="font-family: sans-serif;" >CPF</h3>
                </div>
                <div class="cpf2">
                    <input type="text" name="cpf" id="cpf" placeholder="Digite o CPF" required>
                </div>
            </div>

            <div class="data_nascimento">
                <div class="data_nascimento1">
                    <h3 style="font-family: sans-serif;">Data de Nascimento</h3>
                </div>
                <div class="data_nascimento2">
                    <input type="date" name="data_nascimento" id="data_nascimento"
                        placeholder="Digite a data de nascimento" required>
                </div>
            </div><br>

            <div class="cro">
                <div class="cro1">
                    <h3 style="font-family: sans-serif;" >CRO</h3>
                </div>
                <div class="cro2">
                    <input type="text" name="cro" id="cro" placeholder="Digite o CRO" required>
                </div>
            </div>

            <div class="telefone">
                <div class="telefone1">
                    <h3 style="font-family: sans-serif;">Telefone</h3>
                </div>
                <div class="telefone2">
                    <input type="tel" name="telefone" id="telefone" placeholder="Digite o telefone">
                </div>
            </div><br>

            <div class="email">
                <div class="email1">
                    <h3 style="font-family: sans-serif;">E-mail</h3>
                </div>
                <div class="email2">
                    <input type="email" name="email" id="email" placeholder="Informe seu email">
                </div>
            </div><br><br>
            

            <div class="botao">
                <input type="submit" id="botao" value="Cadastrar">
            </div>

            <div class="voltar">
                <a href="javascript:history.go(-1)" id="botaovoltar">Voltar</a>
            </div>

            
        </form>
        
        
    </div>
</body>
</html>
