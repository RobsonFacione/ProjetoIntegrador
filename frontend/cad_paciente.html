<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Paciente</title>
</head>
<body>
    <h1>Criar Registro do Paciente</h1>
    <form action="cadastro_cad_paciente.php" method="post">
        Nome: <input type="text" name="nome" required><br>
        CPF: <input type="number" name="cpf" required><br>
        Data de Nascimento: <input type="date" name="data_nascimento" required><br>
        Telefone: <input type="number" name="telefone"><br>
        E-mail: <input type="email" name="email"><br>
        <input type="submit" value="Cadastrar Paciente">
    </form>
</body>
</html>
