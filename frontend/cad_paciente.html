<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Paciente</title>
    <link rel="stylesheet" href="cad_paciente.css">
    <style>     
        body {
    margin: 0;
}

.container {
    background-color: rgba(255, 255, 255, 0.4); /* Adicione a opacidade ao definir a cor de fundo com rgba */
    padding: 20px;
    border: none;
}



#botao {
    background-color: #A9A9A9; /* Cor de fundo para os botões */
    color: black;
    padding: 10px 15px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    width: 370px;
}

#botaovoltar {
    background-color: #A9A9A9; /* Cor de fundo para os botões */
    color: black;
    padding: 10px 15px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    width: 340px;
}

#botao:hover, #botaovoltar:hover {
    background-color: #6CA6CD; /* Altere a cor ao passar o mouse sobre os botões se desejar */
}

.botao{
    text-align: center;
}
    
     
   
      
    </style>
</head>

<body>
    <div class="container">
        
        <header style="background-color: #6CA6CD; border: none;">Cadastro de Paciente</header>


        <form action="cadastro_cad_paciente.php" method="post"> <!--preenchimento igual o banco de dados-->
            <div class="nome">
                <div class="nome1">
                    <h3 style="font-family: sans-serif;">Nome</h3>
                </div>
                <div class="nome2">
                    <input type="text" name="nome" id="nome" style="width: 360px;" placeholder="Digite o nome" required>
                </div>
            </div><br>

            <div class="cpf">
                <div class="cpf1">
                    <h3 style="font-family: sans-serif;">CPF</h3>
                </div>
                <div class="cpf2">
                    <input type="number" name="cpf" id="cpf" placeholder="Digite o CPF" required>
                </div>
            </div>

            <div class="data_nascimento">
                <div class="data_nascimento1">
                    <h3 style="font-family: sans-serif;">Data de Nascimento</h3>
                </div>
                <div class="data_nascimento2">
                    <input type="date" name="data_nascimento" id="data_nascimento"
                        placeholder="Digite a data de nascimento" required>
                </div>
            </div><br>

            <div class="telefone">
                <div class="telefone1">
                    <h3 style="font-family: sans-serif;">Telefone</h3>
                </div>
                <div class="telefone2">
                    <input type="tel" name="telefone" id="telefone" placeholder="Digite o telefone">
                </div>
            </div>

            <div class="email">
                <div class="email1">
                    <h3 style="font-family: sans-serif;">E-mail</h3>
                </div>
                <div class="email2">
                    <input type="email" name="email" id="email" style="width: 200px;" placeholder="Informe seu email">
                </div>
            </div>
            <br><br>
            <div class="botao">
                <input type="submit" id="botao" value="Cadastrar">
            </div>
        </form>

        <div class="voltar">
            <a href="javascript:history.go(-1)" id="botaovoltar">Voltar</a>
        </div>
        <!--"text" -  é para entrada com texto, 
            "name" -  deve ser usado principalmente para identificar campos de formulários. Sempre que realizamos um “submit”
             de um formulário, o atributo NAME é o identificador dentro de uma requisição GET ou POST no servidor.
             "id" - O atributo ID é geralmente usado para facilitar a identificação de elementos que vão receber
              um estilo CSS ou até mesmo uma função Javascript.
            "placeholder" - é onde as informações vão ser digitadas
             required - é obrigatório o preenchimento do campo para enviar o formulário-->
    </div>

</body>

</html>
