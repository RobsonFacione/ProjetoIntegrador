<!DOCTYPE html>
<html lang="pr-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="login.css">
</head>

<body>
  <div class="container">

    <div class="header">
      <header>Odonto System</header>
    </div>

    <form action="menu.html" method="get">
      <h3 style="font-family: sans-serif; text-indent: 20px;">CPF</h3>

      <div class="CPF">
        <input type="text" id="CPF" name="CPF" placeholder="Informe o CPF" required><br><br>
      </div>

      <h3 style="font-family: sans-serif; text-indent: 20px;">SENHA</H3>

      <div class="senha">
        <input type="password" id="senha" name="password" placeholder="Digite sua senha" required><br>
      </div><br>

      <div class="entrar">
        <input type="submit" class="botao" value="Entrar">
      </div>
    </form><br>

    <div class="opcoes">
      <form action="esqueceu_a_senha.html" method="get">
      <a href="#" style="font-family: sans-serif;" id="botaoesqueceu">Esqueceu a senha?</a>
      </form>

      <form action="cadastre_se.html" method="get">
      <a href="#" style="font-family: sans-serif;" id="botaocadastre">Cadastre-se</a>
      </form>

    </div>
    
  </div>
</body>

</html>
