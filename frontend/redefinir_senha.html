<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir Senha</title>
    <link rel="stylesheet" href="redefinir_senha.css">
</head>
<body>
    <div class="container">
<div class="header">
        <header>Redefinir Senha</header>
</div>
        <form action="" method="post"> <!--link com o banco de dados para realizar a troca de senha-->
          <div class="senha">
            <h3 style="font-family: sans-serif;">Senha</h3>
            <input type="password" id="senha" name="senha" placeholder="Nova senha" required>
          </div>
    
          <div class="nova_senha">
            <h3 style="font-family: sans-serif;">Nova Senha</h3>
            <input type="password" id="nova_senha" name="nova_senha" placeholder="Confirmar nova senha" required>
          </div>
            <br>
          <div class="botao">
            <input type="submit" id="botao" value="Redefinir">
          </div>
        </form>
        <div class="voltar">
            <a href="javascript:history.go(-1)" id="botaovoltar">Voltar</a>
        </div>
      </div>
</body>
</html>
